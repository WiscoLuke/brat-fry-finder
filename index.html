function formatDate(d) {
  return new Date(d).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
}
function formatTime(d) {
  return new Date(d).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
}

/* ── Google Maps loader ── */
let gmapPromise = null;
function loadGoogleMaps() {
  if (gmapPromise) return gmapPromise;
  if (window.google && window.google.maps) return Promise.resolve(window.google.maps);
  gmapPromise = new Promise((resolve, reject) => {
    const cb = "__gmapCb" + Date.now();
    window[cb] = () => { resolve(window.google.maps); delete window[cb]; };
    const s = document.createElement("script");
    s.src = "https://maps.googleapis.com/maps/api/js?key=" + GMAP_KEY + "&callback=" + cb;
    s.onerror = () => reject(new Error("Failed to load Google Maps"));
    document.head.appendChild(s);
  });
  return gmapPromise;
}

/* ── Interactive Google Map ── */
function GoogleMap({ listings, onSelect, height = 420 }) {
  const ref = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const infoRef = useRef(null);

  const buildMarkers = useCallback((maps) => {
    const map = mapRef.current;
    if (!maps || !map) return;
    markersRef.current.forEach(m => m.setMap(null));
    markersRef.current = [];
    const bounds = new maps.LatLngBounds();

    listings.forEach(item => {
      const pos = { lat: item.lat, lng: item.lng };
      bounds.extend(pos);
      const marker = new maps.Marker({
        position: pos, map, title: item.who,
        icon: {
          path: maps.SymbolPath.CIRCLE,
          scale: item.sponsored ? 12 : 9,
          fillColor: item.sponsored ? "#f0c040" : "#b5331e",
          fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2.5,
        },
        zIndex: item.sponsored ? 10 : 1,
      });

      marker.addListener("click", () => {
        infoRef.current.setContent(
          '<div style="font-family:Libre Franklin,sans-serif;max-width:240px;padding:4px;">' +
            (item.sponsored ? '<div style="background:#f0c040;color:#5a4000;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;display:inline-block;margin-bottom:4px;letter-spacing:1px;">⭐ SPONSORED</div>' : '') +
            '<div style="font-family:Oswald,sans-serif;font-size:16px;font-weight:700;color:#b5331e;margin-bottom:3px;">' + item.who + '</div>' +
            '<div style="font-size:12px;color:#7a6e5f;margin-bottom:6px;">' + item.why + '</div>' +
            '<div style="font-size:12px;color:#4a4237;">📍 ' + item.where + '</div>' +
            '<div style="font-size:12px;color:#4a4237;">📅 ' + formatDate(item.when) + ' · ' + formatTime(item.when) + '–' + formatTime(item.whenEnd) + '</div>' +
            '<div style="font-size:12px;color:#4a4237;margin-bottom:8px;">💳 ' + item.payment + '</div>' +
            '<div style="text-align:center;"><span id="gmBtn_' + item.id + '" style="display:inline-block;background:#b5331e;color:#fff;padding:6px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;">View Full Details</span></div>' +
          '</div>');
        infoRef.current.open(map, marker);
        setTimeout(() => {
          const btn = document.getElementById("gmBtn_" + item.id);
          if (btn) btn.onclick = () => { infoRef.current.close(); onSelect(item); };
        }, 100);
      });
      markersRef.current.push(marker);
    });

    if (listings.length > 1) map.fitBounds(bounds, 50);
    else if (listings.length === 1) { map.setCenter({ lat: listings[0].lat, lng: listings[0].lng }); map.setZoom(13); }
  }, [listings, onSelect]);

  useEffect(() => {
    let dead = false;
    loadGoogleMaps().then(maps => {
      if (dead || !ref.current) return;
      const map = new maps.Map(ref.current, {
        center: { lat: 44.82, lng: -89.95 }, zoom: 8,
        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "water", stylers: [{ color: "#c9e8f7" }] },
          { featureType: "landscape", stylers: [{ color: "#f5f0e8" }] },
        ],
        mapTypeControl: false, streetViewControl: false, fullscreenControl: true, zoomControl: true,
      });
      mapRef.current = map;
      infoRef.current = new maps.InfoWindow();
      buildMarkers(maps);
    });
    return () => { dead = true; };
  }, []);

  useEffect(() => {
    if (mapRef.current && window.google && window.google.maps) buildMarkers(window.google.maps);
  }, [listings, buildMarkers]);

  return <div ref={ref} style={{ width: "100%", height, borderRadius: 16, overflow: "hidden", border: "2px solid #e8e0d4" }} />;
}

/* ── Detail map pin ── */
function DetailMap({ lat, lng }) {
  const ref = useRef(null);
  useEffect(() => {
    loadGoogleMaps().then(maps => {
      if (!ref.current) return;
      const pos = { lat, lng };
      const map = new maps.Map(ref.current, {
        center: pos, zoom: 15, disableDefaultUI: true, zoomControl: true,
        styles: [{ featureType: "poi", stylers: [{ visibility: "off" }] }, { featureType: "water", stylers: [{ color: "#c9e8f7" }] }],
      });
      new maps.Marker({ position: pos, map, icon: {
        path: maps.SymbolPath.CIRCLE, scale: 11,
        fillColor: "#b5331e", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 3,
      }});
    });
  }, [lat, lng]);
  return <div ref={ref} style={{ width: "100%", height: 220, borderRadius: 12, overflow: "hidden", border: "2px solid #e8e0d4" }} />;
}

/* ── Payment Portal ── */
function PaymentPortal({ onSuccess, onBack }) {
  const [card, setCard] = useState({ number: "", exp: "", cvc: "", name: "", zip: "" });
  const [processing, setProcessing] = useState(false);
  const [error, setError] = useState("");
  const set = (k, v) => setCard(p => ({ ...p, [k]: v }));

  const formatCardNumber = (v) => v.replace(/\D/g, "").slice(0, 16).replace(/(.{4})/g, "$1 ").trim();
  const formatExp = (v) => {
    const d = v.replace(/\D/g, "").slice(0, 4);
    return d.length > 2 ? d.slice(0, 2) + "/" + d.slice(2) : d;
  };

  const isValid = card.number.replace(/\s/g, "").length === 16 && card.exp.length === 5 && card.cvc.length >= 3 && card.name && card.zip.length >= 5;

  const handlePay = () => {
    setProcessing(true);
    setError("");
    setTimeout(() => {
      setProcessing(false);
      onSuccess();
    }, 2200);
  };

  const inputStyle = { width: "100%", padding: "12px 14px", border: "2px solid #e8e0d4", borderRadius: 10, fontSize: 15, background: "#fffdf7", boxSizing: "border-box", fontFamily: "'Courier New', monospace", outline: "none", letterSpacing: 1 };
  const labelStyle = { fontSize: 12, fontWeight: 700, color: "#a0937e", letterSpacing: 0.8, marginBottom: 4, display: "block", fontFamily: "'Oswald', sans-serif" };

  if (processing) {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px" }}>
        <div style={{ fontSize: 48, marginBottom: 16, animation: "spin 1s linear infinite" }}>💳</div>
        <style dangerouslySetInnerHTML={{__html: "@keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }"}} />
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 20, fontWeight: 700, color: "#5a4000" }}>Processing Payment...</div>
        <div style={{ fontSize: 13, color: "#8a7a50", marginTop: 6 }}>Securely processing your $25.00 sponsorship</div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: "linear-gradient(135deg, #fff9e6, #fff3cc)", border: "2px solid #f0c040", borderRadius: 14, padding: 18, marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 700, color: "#5a4000", letterSpacing: 1 }}>⭐ SPONSORED LISTING</div>
            <div style={{ fontSize: 12, color: "#8a7a50", marginTop: 2 }}>Top placement + highlighted card</div>
          </div>
          <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 28, fontWeight: 700, color: "#5a4000" }}>$25<span style={{ fontSize: 14, fontWeight: 400 }}>.00</span></div>
        </div>
      </div>
      <div style={{ display: "grid", gap: 14 }}>
        <div>
          <label style={labelStyle}>Cardholder Name</label>
          <input style={{ ...inputStyle, fontFamily: "inherit", letterSpacing: 0 }} value={card.name} onChange={e => set("name", e.target.value)} placeholder="John Doe" />
        </div>
        <div>
          <label style={labelStyle}>Card Number</label>
          <div style={{ position: "relative" }}>
            <input style={inputStyle} value={formatCardNumber(card.number)} onChange={e => set("number", e.target.value.replace(/\D/g, ""))} placeholder="4242 4242 4242 4242" />
            <div style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", display: "flex", gap: 4 }}>
              {["💳"].map((c, i) => <span key={i} style={{ fontSize: 20 }}>{c}</span>)}
            </div>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          <div>
            <label style={labelStyle}>Expiration</label>
            <input style={inputStyle} value={formatExp(card.exp)} onChange={e => set("exp", e.target.value.replace(/\D/g, ""))} placeholder="MM/YY" />
          </div>
          <div>
            <label style={labelStyle}>CVC</label>
            <input style={inputStyle} value={card.cvc} onChange={e => set("cvc", e.target.value.replace(/\D/g, "").slice(0, 4))} placeholder="123" type="password" />
          </div>
          <div>
            <label style={labelStyle}>ZIP Code</label>
            <input style={inputStyle} value={card.zip} onChange={e => set("zip", e.target.value.replace(/\D/g, "").slice(0, 5))} placeholder="54479" />
          </div>
        </div>
      </div>
      {error && <div style={{ color: "#c0392b", fontSize: 13, fontWeight: 600, marginTop: 10 }}>⚠️ {error}</div>}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 16, padding: "10px 14px", background: "#f0fdf0", borderRadius: 10, border: "1px solid #c8e6c9" }}>
        <span style={{ fontSize: 16 }}>🔒</span>
        <span style={{ fontSize: 11, color: "#2e7d32", fontWeight: 600 }}>256-bit SSL encrypted · Your card info is never stored</span>
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
        <button onClick={onBack} style={{ flex: 1, padding: "12px 0", border: "2px solid #e8e0d4", background: "transparent", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 14, color: "#7a6e5f" }}>← Back</button>
        <button disabled={!isValid} onClick={handlePay} style={{
          flex: 2, padding: "14px 0", border: "none", borderRadius: 10, cursor: isValid ? "pointer" : "default",
          fontWeight: 700, fontSize: 15, color: "white", letterSpacing: 0.5,
          background: isValid ? "linear-gradient(135deg, #f0c040, #e6a800)" : "#ccc",
          boxShadow: isValid ? "0 4px 16px rgba(240,192,64,0.4)" : "none"
        }}>🔒 Pay $25.00</button>
      </div>
    </div>
  );
}

function SubmitForm({ onSubmit, onCancel }) {
  const [form, setForm] = useState({ who: "", where: "", startDate: "", startTime: "", endDate: "", endTime: "", what: "", payment: [], why: "", contact: "", sponsored: false, flyer: null, flyerPreview: null });
  const [step, setStep] = useState(1);
  const [captcha, setCaptcha] = useState(() => {
    const a = Math.floor(Math.random() * 10) + 1;
    const b = Math.floor(Math.random() * 10) + 1;
    return { a, b, answer: "", correct: a + b };
  });
  const resetCaptcha = () => {
    const a = Math.floor(Math.random() * 10) + 1;
    const b = Math.floor(Math.random() * 10) + 1;
    setCaptcha({ a, b, answer: "", correct: a + b });
  };
  const captchaPassed = parseInt(captcha.answer) === captcha.correct;
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const handleFileSelect = (file) => {
    const maxSize = 10 * 1024 * 1024;
    const allowed = ["image/png", "image/jpeg", "image/jpg", "application/pdf"];
    if (!allowed.includes(file.type)) { alert("Please upload a PNG, JPG, or PDF file."); return; }
    if (file.size > maxSize) { alert("File must be under 10MB."); return; }
    if (file.type === "application/pdf") {
      setForm(p => ({ ...p, flyer: file, flyerPreview: "pdf" }));
    } else {
      const reader = new FileReader();
      reader.onload = (e) => setForm(p => ({ ...p, flyer: file, flyerPreview: e.target.result }));
      reader.readAsDataURL(file);
    }
  };
  const totalSteps = form.sponsored ? 4 : 3;
  const canNext = () => {
    if (step === 1) return form.who && form.where && form.contact;
    if (step === 2) return form.startDate.length === 10 && form.startTime && form.endDate.length === 10 && form.endTime && form.what && form.payment.length > 0;
    if (step === 3) return captchaPassed;
    return true;
  };
  const parseDate = (d) => { const [m, dd, y] = d.split("-"); return y + "-" + m + "-" + dd; };
  const handleFinalSubmit = () => {
    const when = parseDate(form.startDate) + "T" + form.startTime;
    const whenEnd = parseDate(form.endDate) + "T" + form.endTime;
    onSubmit({ ...form, id: Date.now(), when, whenEnd, payment: form.payment.join(", "), flyerUrl: form.flyerPreview, flyerName: form.flyer ? form.flyer.name : null, lat: 44.76 + (Math.random() - 0.5) * 0.4, lng: -90.18 + (Math.random() - 0.5) * 0.4 });
  };
  const handlePaymentSuccess = () => {
    handleFinalSubmit();
  };
  const inputStyle = { width: "100%", padding: "10px 14px", border: "2px solid #e8e0d4", borderRadius: 10, fontSize: 14, background: "#fffdf7", boxSizing: "border-box", fontFamily: "inherit", outline: "none" };
  const labelStyle = { fontSize: 12, fontWeight: 700, color: "#a0937e", letterSpacing: 0.8, marginBottom: 4, display: "block", fontFamily: "'Oswald', sans-serif" };

  return (
    <div style={{ background: "#fff", borderRadius: 20, border: "1px solid #e8e0d4", overflow: "hidden" }}>
      <div style={{ background: step === 4 ? "linear-gradient(135deg, #b8860b 0%, #daa520 100%)" : "linear-gradient(135deg, #2e7d32 0%, #4caf50 100%)", padding: "20px 24px", color: "white", transition: "background 0.3s" }}>
        <h2 style={{ margin: 0, fontFamily: "'Oswald', sans-serif", fontSize: 22 }}>
          {step === 4 ? "💳 Sponsor Payment" : "🌭 Submit Your Brat Fry"}
        </h2>
        <div style={{ fontSize: 13, opacity: 0.85, marginTop: 4 }}>Step {step} of {totalSteps}</div>
        <div style={{ height: 4, background: "rgba(255,255,255,0.3)", borderRadius: 4, marginTop: 10 }}>
          <div style={{ height: "100%", width: ((step / totalSteps) * 100) + "%", background: step === 4 ? "#fff" : "#f0c040", borderRadius: 4, transition: "width 0.3s" }} />
        </div>
      </div>
      <div style={{ padding: 24, display: "grid", gap: 14 }}>
        {step === 1 && <>
          <div><label style={labelStyle}>Who's Hosting? *</label><input style={inputStyle} value={form.who} onChange={e => set("who", e.target.value)} placeholder="e.g. Spencer Fire Dept" /></div>
          <div><label style={labelStyle}>Location / Address *</label><input style={inputStyle} value={form.where} onChange={e => set("where", e.target.value)} placeholder="123 Main St, Spencer, WI 54479" /></div>
          <div><label style={labelStyle}>Contact Email *</label><input style={inputStyle} type="email" value={form.contact} onChange={e => set("contact", e.target.value)} placeholder="you@example.com" /></div>
          <div>
            <label style={labelStyle}>Upload Flyer or Menu (optional)</label>
            <div style={{
              border: form.flyerPreview ? "2px solid #2e7d32" : "2px dashed #d4c8b4",
              borderRadius: 12, padding: form.flyerPreview ? 0 : 24, textAlign: "center",
              background: form.flyerPreview ? "#f9f9f6" : "#fdfcf8", cursor: "pointer",
              transition: "all 0.2s", overflow: "hidden", position: "relative"
            }}
              onClick={() => document.getElementById("flyerInput").click()}
              onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = "#2e7d32"; e.currentTarget.style.background = "#e8f5e9"; }}
              onDragLeave={e => { e.currentTarget.style.borderColor = form.flyerPreview ? "#2e7d32" : "#d4c8b4"; e.currentTarget.style.background = form.flyerPreview ? "#f9f9f6" : "#fdfcf8"; }}
              onDrop={e => {
                e.preventDefault();
                e.currentTarget.style.borderColor = "#2e7d32";
                const file = e.dataTransfer.files[0];
                if (file) handleFileSelect(file);
              }}
            >
              {form.flyerPreview ? (
                <div style={{ position: "relative" }}>
                  {form.flyer && form.flyer.type === "application/pdf" ? (
                    <div style={{ padding: 20, display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 48, height: 48, borderRadius: 10, background: "linear-gradient(135deg, #e53935, #c62828)", display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 800, fontSize: 12, fontFamily: "'Oswald', sans-serif" }}>PDF</div>
                      <div style={{ textAlign: "left" }}>
                        <div style={{ fontSize: 14, fontWeight: 600, color: "#3a3428" }}>{form.flyer.name}</div>
                        <div style={{ fontSize: 11, color: "#a0937e" }}>{(form.flyer.size / 1024).toFixed(0)} KB</div>
                      </div>
                    </div>
                  ) : (
                    <img src={form.flyerPreview} alt="Flyer preview" style={{ width: "100%", maxHeight: 200, objectFit: "cover", display: "block" }} />
                  )}
                  <button onClick={e => { e.stopPropagation(); set("flyer", null); set("flyerPreview", null); }} style={{
                    position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.6)", color: "white",
                    border: "none", width: 26, height: 26, borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 700
                  }}>✕</button>
                </div>
              ) : (
                <>
                  <div style={{ fontSize: 32, marginBottom: 6 }}>📎</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#7a6e5f" }}>Drag & drop or click to upload</div>
                  <div style={{ fontSize: 11, color: "#a0937e", marginTop: 4 }}>PNG, JPG, or PDF · Max 10MB</div>
                </>
              )}
            </div>
            <input id="flyerInput" type="file" accept=".png,.jpg,.jpeg,.pdf" style={{ display: "none" }}
              onChange={e => { if (e.target.files[0]) handleFileSelect(e.target.files[0]); }}
            />
          </div>
        </>}
        {step === 2 && <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div>
              <label style={labelStyle}>Start Date * (MM-DD-YYYY)</label>
              <input style={inputStyle} value={form.startDate} placeholder="MM-DD-YYYY"
                onChange={e => {
                  let v = e.target.value.replace(/[^\d-]/g, "").replace(/--+/g, "-");
                  const digits = v.replace(/-/g, "");
                  if (digits.length <= 2) v = digits;
                  else if (digits.length <= 4) v = digits.slice(0,2) + "-" + digits.slice(2);
                  else v = digits.slice(0,2) + "-" + digits.slice(2,4) + "-" + digits.slice(4,8);
                  set("startDate", v.slice(0, 10));
                }}
                maxLength={10}
              />
            </div>
            <div>
              <label style={labelStyle}>Start Time *</label>
              <input style={inputStyle} type="time" value={form.startTime} onChange={e => set("startTime", e.target.value)} />
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div>
              <label style={labelStyle}>End Date * (MM-DD-YYYY)</label>
              <input style={inputStyle} value={form.endDate} placeholder="MM-DD-YYYY"
                onChange={e => {
                  let v = e.target.value.replace(/[^\d-]/g, "").replace(/--+/g, "-");
                  const digits = v.replace(/-/g, "");
                  if (digits.length <= 2) v = digits;
                  else if (digits.length <= 4) v = digits.slice(0,2) + "-" + digits.slice(2);
                  else v = digits.slice(0,2) + "-" + digits.slice(2,4) + "-" + digits.slice(4,8);
                  set("endDate", v.slice(0, 10));
                }}
                maxLength={10}
              />
            </div>
            <div>
              <label style={labelStyle}>End Time *</label>
              <input style={inputStyle} type="time" value={form.endTime} onChange={e => set("endTime", e.target.value)} />
            </div>
          </div>
          <div><label style={labelStyle}>Menu — What's Being Served? *</label><textarea style={{ ...inputStyle, minHeight: 80, resize: "vertical" }} value={form.what} onChange={e => set("what", e.target.value)} placeholder="Brats, Hot Dogs, Burgers, Chips, Lemonade..." /></div>
          <div>
            <label style={labelStyle}>Payment Options Accepted *</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 4 }}>
              {["Cash", "Credit/Debit", "Venmo", "PayPal", "Zelle", "Apple Pay", "Google Pay"].map(opt => {
                const checked = form.payment.includes(opt);
                return (
                  <label key={opt} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "8px 14px",
                    borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 600,
                    border: checked ? "2px solid #2e7d32" : "2px solid #e8e0d4",
                    background: checked ? "#e8f5e9" : "#fffdf7",
                    color: checked ? "#2e7d32" : "#7a6e5f",
                    transition: "all 0.15s"
                  }}>
                    <input type="checkbox" checked={checked} onChange={() => {
                      set("payment", checked ? form.payment.filter(p => p !== opt) : [...form.payment, opt]);
                    }} style={{ display: "none" }} />
                    {checked ? "✓" : "○"} {opt}
                  </label>
                );
              })}
            </div>
          </div>
        </>}
        {step === 3 && <>
          <div><label style={labelStyle}>What's the Cause / Why?</label><textarea style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} value={form.why} onChange={e => set("why", e.target.value)} placeholder="Fundraiser for new playground equipment..." /></div>
          <div style={{ background: "linear-gradient(135deg, #fff9e6, #fff3cc)", border: "2px solid #f0c040", borderRadius: 14, padding: 18 }}>
            <label style={{ display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer" }}>
              <input type="checkbox" checked={form.sponsored} onChange={e => set("sponsored", e.target.checked)} style={{ marginTop: 3, width: 18, height: 18, accentColor: "#f0c040" }} />
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#5a4000" }}>⭐ Sponsor Your Listing — $25</div>
                <div style={{ fontSize: 12, color: "#8a7a50", marginTop: 2 }}>Your brat fry will appear at the TOP of search results with a highlighted card. Great for maximum visibility!</div>
              </div>
            </label>
          </div>
          <div style={{ background: "#f9f9f6", border: "2px solid #e8e0d4", borderRadius: 14, padding: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <span style={{ fontSize: 20 }}>🛡️</span>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#4a4237" }}>Verify you're human</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <div style={{
                background: "linear-gradient(135deg, #3a3428, #5a4e3a)", color: "#f0c040",
                padding: "10px 18px", borderRadius: 10, fontFamily: "'Courier New', monospace",
                fontSize: 22, fontWeight: 700, letterSpacing: 2, userSelect: "none",
                textShadow: "0 2px 4px rgba(0,0,0,0.3)"
              }}>
                {captcha.a} + {captcha.b} = ?
              </div>
              <input
                value={captcha.answer}
                onChange={e => setCaptcha(p => ({ ...p, answer: e.target.value.replace(/\D/g, "").slice(0, 2) }))}
                placeholder="?"
                style={{
                  width: 70, padding: "10px 14px", border: captchaPassed ? "2px solid #2e7d32" : "2px solid #e8e0d4",
                  borderRadius: 10, fontSize: 18, textAlign: "center", fontWeight: 700,
                  background: captchaPassed ? "#e8f5e9" : "#fffdf7",
                  fontFamily: "'Courier New', monospace", outline: "none"
                }}
              />
              {captchaPassed && <span style={{ color: "#2e7d32", fontWeight: 700, fontSize: 18 }}>✓</span>}
              {captcha.answer && !captchaPassed && <span style={{ color: "#c0392b", fontSize: 12, fontWeight: 600 }}>Try again</span>}
              <button onClick={resetCaptcha} title="New problem" style={{
                background: "none", border: "1px solid #ccc", borderRadius: 8, padding: "6px 10px",
                cursor: "pointer", fontSize: 14, color: "#999"
              }}>🔄</button>
            </div>
          </div>
        </>}
        {step === 4 && <PaymentPortal onSuccess={handlePaymentSuccess} onBack={() => setStep(3)} />}
        {step < 4 && (
          <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
            {step > 1 && <button onClick={() => setStep(s => s - 1)} style={{ flex: 1, padding: "12px 0", border: "2px solid #e8e0d4", background: "transparent", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 14, color: "#7a6e5f" }}>← Back</button>}
            <button onClick={onCancel} style={{ flex: 1, padding: "12px 0", border: "2px solid #e8e0d4", background: "transparent", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 14, color: "#999" }}>Cancel</button>
            {step < 3 ? (
              <button disabled={!canNext()} onClick={() => setStep(s => s + 1)} style={{ flex: 2, padding: "12px 0", border: "none", borderRadius: 10, cursor: canNext() ? "pointer" : "default", fontWeight: 700, fontSize: 14, color: "white", background: canNext() ? "linear-gradient(135deg, #2e7d32, #4caf50)" : "#ccc" }}>Next →</button>
            ) : form.sponsored ? (
              <button disabled={!captchaPassed} onClick={() => setStep(4)} style={{ flex: 2, padding: "12px 0", border: "none", borderRadius: 10, cursor: captchaPassed ? "pointer" : "default", fontWeight: 700, fontSize: 14, color: captchaPassed ? "#5a4000" : "#999", background: captchaPassed ? "linear-gradient(135deg, #f0c040, #e6a800)" : "#ccc", boxShadow: captchaPassed ? "0 4px 12px rgba(240,192,64,0.3)" : "none" }}>💳 Proceed to Payment →</button>
            ) : (
              <button disabled={!captchaPassed} onClick={handleFinalSubmit} style={{ flex: 2, padding: "12px 0", border: "none", borderRadius: 10, cursor: captchaPassed ? "pointer" : "default", fontWeight: 700, fontSize: 14, color: "white", background: captchaPassed ? "linear-gradient(135deg, #b5331e, #d4541e)" : "#ccc" }}>🌭 Submit Brat Fry!</button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("list");
  const [listings, setListings] = useState(SAMPLE_DATA);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState("");

  useEffect(() => {
    const timer = setInterval(() => {
      const now = Date.now();
      setListings(prev => prev.filter(l => (now - new Date(l.whenEnd).getTime()) < 24 * 60 * 60 * 1000));
    }, 60000);
    return () => clearInterval(timer);
  }, []);

  const active = listings.filter(l => (Date.now() - new Date(l.whenEnd).getTime()) < 24 * 60 * 60 * 1000);

  const sorted = [...active].sort((a, b) => {
    if (a.sponsored && !b.sponsored) return -1;
    if (!a.sponsored && b.sponsored) return 1;
    return new Date(a.when) - new Date(b.when);
  });
  const filtered = sorted.filter(l => {
    const q = search.toLowerCase();
    return !q || l.who.toLowerCase().includes(q) || l.where.toLowerCase().includes(q) || l.what.toLowerCase().includes(q) || l.why.toLowerCase().includes(q);
  });
  const handleSubmit = (item) => {
    setListings(p => [...p, item]);
    setView("list");
    setToast("🎉 Brat fry submitted successfully!");
    setTimeout(() => setToast(""), 3500);
  };

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #fff8e1 0%, #fffdf7 30%, #f5f0e8 100%)", fontFamily: "'Libre Franklin', 'Segoe UI', sans-serif" }}>
      <header style={{ background: "linear-gradient(135deg, #b5331e 0%, #d4541e 60%, #e8751e 100%)", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 4px 20px rgba(181,51,30,0.3)" }}>
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "16px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <div>
              <h1 style={{ margin: 0, fontFamily: "'Oswald', sans-serif", fontSize: 28, fontWeight: 700, color: "white", letterSpacing: 1, lineHeight: 1 }}>🌭 BRAT FRY FINDER</h1>
              <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 12, fontWeight: 300, marginTop: 2 }}>Find brat frys near you — Wisconsin's favorite tradition</div>
            </div>
            <button onClick={() => setView(view === "submit" ? "list" : "submit")} style={{ background: view === "submit" ? "rgba(255,255,255,0.2)" : "#f0c040", color: view === "submit" ? "white" : "#5a4000", border: "none", padding: "8px 18px", borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "'Oswald', sans-serif", letterSpacing: 0.5 }}>
              {view === "submit" ? "✕ Cancel" : "+ POST YOUR BRAT FRY"}
            </button>
          </div>
          {view !== "submit" && (
            <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name, location, menu..." style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: "none", fontSize: 14, background: "rgba(255,255,255,0.95)", outline: "none" }} />
              <div style={{ display: "flex", gap: 4 }}>
                {["list", "map"].map(v => (
                  <button key={v} onClick={() => setView(v)} style={{ padding: "8px 14px", borderRadius: 10, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, background: view === v ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.2)", color: view === v ? "#b5331e" : "white" }}>
                    {v === "list" ? "📋" : "🗺️"}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </header>

      <HeroBanner />

      {toast && <div style={{ position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)", background: "#2e7d32", color: "white", padding: "12px 24px", borderRadius: 12, fontWeight: 700, zIndex: 1001, boxShadow: "0 4px 20px rgba(0,0,0,0.2)", fontSize: 14 }}>{toast}</div>}

      <main style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 80px" }}>
        {view === "submit" ? (
          <SubmitForm onSubmit={handleSubmit} onCancel={() => setView("list")} />
        ) : view === "map" ? (
          <MapView listings={filtered} onSelect={setSelected} />
        ) : (
          <div style={{ display: "grid", gap: 12 }}>
            <AdBanner slot={AD_SLOTS[0]} />
            <div style={{ fontSize: 13, color: "#a0937e", fontWeight: 600 }}>{filtered.length} brat fr{filtered.length === 1 ? "y" : "ys"} found</div>
            {filtered.map((item, i) => (
              <div key={item.id}>
                <BratCard item={item} onSelect={setSelected} />
                {(i + 1) % 3 === 0 && i < filtered.length - 1 && AD_SLOTS[Math.floor((i + 1) / 3)] && (
                  <div style={{ marginTop: 12 }}><AdBanner slot={AD_SLOTS[Math.floor((i + 1) / 3)]} /></div>
                )}
              </div>
            ))}
            {filtered.length === 0 && (
              <div style={{ textAlign: "center", padding: 60, color: "#a0937e" }}>
                <EmptyStateIllustration />
                <div style={{ fontSize: 16, fontWeight: 600 }}>No brat frys found</div>
                <div style={{ fontSize: 13, marginTop: 4 }}>Try a different search or post your own!</div>
              </div>
            )}
            <div style={{ background: "linear-gradient(135deg, #e8e0d4, #f5f0e8)", borderRadius: 16, padding: 24, textAlign: "center", border: "2px dashed #c4b8a4", marginTop: 8, position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", top: -10, right: -10, opacity: 0.12 }}><GrillIcon size={100} /></div>
              <div style={{ position: "relative" }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 18, fontWeight: 700, color: "#6b5e4f" }}>📣 Advertise Here!</div>
                <div style={{ fontSize: 13, color: "#8a7a60", marginTop: 6, maxWidth: 400, margin: "6px auto 12px" }}>Reach thousands of brat fry fans across Wisconsin. Premium banner placements available for brands and local businesses.</div>
                <button style={{ background: "#b5331e", color: "white", border: "none", padding: "10px 24px", borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Contact for Ad Rates</button>
              </div>
            </div>
          </div>
        )}
      </main>

      <DetailModal item={selected} onClose={() => setSelected(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
